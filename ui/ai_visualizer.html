<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
canvas { border:1px solid #ccc; width:100%; }
#warnings { color:red; }
</style>
</head>
<body>

<h3>🤖 AI Circuit Generator + Visualizer</h3>
<input id="prompt" placeholder="e.g. water level controller" style="width:100%;padding:8px;"/>
<button onclick="generate()" style="width:100%;padding:10px;">Generate + Simulate</button>

<pre id="net"></pre>
<div id="warnings"></div>
<canvas id="c" height="300"></canvas>

<script>
const ctx = document.getElementById('c').getContext('2d');

function getColor(v){
 if(v>4) return 'red';
 if(v>2) return 'orange';
 return 'blue';
}

function draw(nodes){
 ctx.clearRect(0,0,600,300);
 for(let i=0;i<nodes.length-1;i++){
  let n1=nodes[i], n2=nodes[i+1];
  let g=ctx.createLinearGradient(n1.x,n1.y,n2.x,n2.y);
  g.addColorStop(0,getColor(n1.v));
  g.addColorStop(1,getColor(n2.v));
  ctx.strokeStyle=g; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(n1.x,n1.y); ctx.lineTo(n2.x,n2.y); ctx.stroke();
 }
 nodes.forEach(n=>{
  ctx.fillStyle=getColor(n.v);
  ctx.beginPath(); ctx.arc(n.x,n.y,10,0,2*Math.PI); ctx.fill();
 });
}

async function generate(){
 const prompt = document.getElementById('prompt').value;

 const gen = await fetch('http://localhost:8000/generate-circuit',{
  method:'POST',headers:{'Content-Type':'application/json'},
  body: JSON.stringify({prompt})
 });
 const gdata = await gen.json();
 document.getElementById('net').innerText = gdata.netlist;

 const sim = await fetch('http://localhost:8000/simulate-visual',{
  method:'POST',headers:{'Content-Type':'application/json'},
  body: JSON.stringify({netlist: gdata.netlist})
 });
 const sdata = await sim.json();

 document.getElementById('warnings').innerHTML = sdata.issues.map(i=>"⚠️ "+i).join("<br>");

 const voltages = Object.values(sdata.simulation.voltages);
 const nodes = voltages.map((v,i)=>({x:50+i*150,y:150,v:v}));
 draw(nodes);
}
</script>

</body>
</html>
