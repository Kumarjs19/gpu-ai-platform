version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    image: python:3.10
    working_dir: /app
    volumes:
      - ./api:/app
    command: sh -c "pip install fastapi uvicorn redis python-jose passlib[bcrypt] && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: ./worker
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
